<!-- Auto-generated Form Template for: labs -->
<div class="cms-ui-wrapper cms-fade-in" id="cms-labs-form" style="display:none;">
    <div class="cms-ui-header">
        <div class="cms-ui-title-group">
            <h2 id="form-title">Create New Lab</h2>
            <p>Fill out the details below to add or update a record.</p>
        </div>
        <button class="cms-btn cms-btn-ghost" onclick="closeForm()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to List
        </button>
    </div>
    <div class="cms-glass-card">
        <form class="cms-modern-form" onsubmit="handleFormSubmit(event)">
            <div class="cms-form-grid">

                <div class="cms-form-group">
                    <label for="f_title">Title</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="title" id="f_title" class="cms-form-control" placeholder="Enter Title...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_department_key">Department Key</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="department_key" id="f_department_key" class="cms-form-control" placeholder="Enter Department Key...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_department_name">Department Name</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="department_name" id="f_department_name" class="cms-form-control" placeholder="Enter Department Name...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_description">Description</label>
                    <div class="cms-input-wrapper">
                    <textarea name="description" id="f_description" class="cms-form-control" rows="4" placeholder="Enter Description..."></textarea>
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_equipment">Equipment</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="equipment" id="f_equipment" class="cms-form-control" placeholder="Enter Equipment...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_capacity">Capacity</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="capacity" id="f_capacity" class="cms-form-control" placeholder="Enter Capacity...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_software">Software</label>
                    <div class="cms-input-wrapper">
                    <input type="text" name="software" id="f_software" class="cms-form-control" placeholder="Enter Software...">
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_image_url">Image Url</label>
                    <div class="cms-input-wrapper">
                    <div class="cms-media-field" data-col="image_url" data-accept="image/*">
                        <div class="cms-media-preview" id="prev_image_url"></div>
                        <div class="cms-media-actions">
                            <button type="button" class="cms-btn cms-btn-sm" onclick="openMediaPicker('image_url','image')">📷 Upload / Pick</button>
                            <button type="button" class="cms-btn cms-btn-sm cms-btn-ghost" onclick="addMediaUrl('image_url')">🔗 Add URL</button>
                        </div>
                        <input type="hidden" name="image_url" id="f_image_url">
                    </div>
                    </div>
                </div>

                <div class="cms-form-group">
                    <label for="f_document_url">Document Url</label>
                    <div class="cms-input-wrapper">
                    <div class="cms-media-field" data-col="document_url" data-accept="*">
                        <div class="cms-media-preview" id="prev_document_url"></div>
                        <div class="cms-media-actions">
                            <button type="button" class="cms-btn cms-btn-sm" onclick="openMediaPicker('document_url','all')">📎 Upload / Pick</button>
                            <button type="button" class="cms-btn cms-btn-sm cms-btn-ghost" onclick="addMediaUrl('document_url')">🔗 Add URL</button>
                        </div>
                        <input type="hidden" name="document_url" id="f_document_url">
                    </div>
                    </div>
                </div>

            </div>
            <div class="cms-form-actions">
                <button type="button" class="cms-btn cms-btn-light" onclick="closeForm()">Cancel</button>
                <button type="submit" class="cms-btn cms-btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Record
                </button>
            </div>
        </form>
    </div>
</div>
